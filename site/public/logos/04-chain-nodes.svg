<!-- Option 4: Chain of nodes — three circles connected by edges,
     representing the chains/orchestrator concept. Abstract. Works at
     small sizes. Plays on 'skills chain into orchestrators'. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="skillskit">
  <!-- Connecting edges -->
  <line x1="15" y1="20" x2="32" y2="32" stroke="#1e6fd1" stroke-width="3"
        stroke-linecap="round"/>
  <line x1="32" y1="32" x2="49" y2="44" stroke="#1e6fd1" stroke-width="3"
        stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="15" cy="20" r="6" fill="#1e6fd1"/>
  <circle cx="32" cy="32" r="8" fill="#0f4fa0"/>
  <circle cx="49" cy="44" r="6" fill="#1e6fd1"/>
  <!-- Small accent dot at center node to show it's the 'orchestrator' -->
  <circle cx="32" cy="32" r="2.5" fill="#ffffff"/>
</svg>
