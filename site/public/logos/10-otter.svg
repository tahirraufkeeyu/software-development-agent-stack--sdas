<!-- Option 10: Otter — tool-using, playful, skill-wielding.
     Otters use rocks to crack shells; stands in nicely for
     'uses the right skill for the job'. Holding a round "tool" /
     rock between paws makes the metaphor visible. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="skillskit">
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#e8f0f4"/>
  <!-- Body (horizontal, floating-on-back pose) -->
  <ellipse cx="32" cy="42" rx="22" ry="10" fill="#8a6f52"/>
  <!-- Chest / belly (lighter tone) -->
  <ellipse cx="32" cy="44" rx="16" ry="6" fill="#c4a989"/>
  <!-- Head (on the right, peeking up) -->
  <circle cx="46" cy="26" r="9" fill="#8a6f52"/>
  <!-- Ears -->
  <circle cx="42" cy="19" r="2" fill="#8a6f52"/>
  <circle cx="50" cy="19" r="2" fill="#8a6f52"/>
  <!-- Eye -->
  <circle cx="49" cy="24" r="1.5" fill="#1d1410"/>
  <!-- Nose -->
  <ellipse cx="53.5" cy="27" rx="1.5" ry="1" fill="#1d1410"/>
  <!-- Front paws holding tool -->
  <circle cx="24" cy="34" r="3.5" fill="#8a6f52"/>
  <circle cx="18" cy="34" r="3.5" fill="#8a6f52"/>
  <!-- The tool / rock / "skill" -->
  <circle cx="14" cy="32" r="4" fill="#1e6fd1"/>
  <circle cx="14" cy="32" r="2" fill="#ffffff"/>
  <!-- Tail peeking out left -->
  <ellipse cx="9" cy="44" rx="4" ry="2" fill="#8a6f52" transform="rotate(-10 9 44)"/>
</svg>
