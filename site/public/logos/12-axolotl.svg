<!-- Option 12: Axolotl — distinctive, memorable, nothing else looks
     like it. The feathery gills on the head are the signature and
     make it recognisable even at 16 px. Axolotls regenerate — a
     subtle nod to 'customise and re-customise your skill forever'. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="skillskit">
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#fff4f4"/>
  <!-- Body (elongated, tadpole-ish) -->
  <path d="M 16 32
           Q 16 22, 26 22
           L 44 22
           Q 54 22, 54 32
           Q 54 42, 44 42
           L 26 42
           Q 16 42, 16 32 Z" fill="#f08ab0"/>
  <!-- Tail -->
  <path d="M 16 32
           L 8 24
           L 10 32
           L 8 40
           Z" fill="#f08ab0"/>
  <!-- Signature gills on right side of head (three feathery tufts each side) -->
  <!-- Top gills (curve up from head) -->
  <path d="M 46 22 Q 44 14, 40 12" fill="none" stroke="#f08ab0" stroke-width="3"
        stroke-linecap="round"/>
  <path d="M 50 22 Q 50 12, 46 10" fill="none" stroke="#f08ab0" stroke-width="3"
        stroke-linecap="round"/>
  <path d="M 52 24 Q 56 14, 54 10" fill="none" stroke="#f08ab0" stroke-width="3"
        stroke-linecap="round"/>
  <!-- Bottom gills (curve down) -->
  <path d="M 46 42 Q 44 50, 40 52" fill="none" stroke="#f08ab0" stroke-width="3"
        stroke-linecap="round"/>
  <path d="M 50 42 Q 50 52, 46 54" fill="none" stroke="#f08ab0" stroke-width="3"
        stroke-linecap="round"/>
  <path d="M 52 40 Q 56 50, 54 54" fill="none" stroke="#f08ab0" stroke-width="3"
        stroke-linecap="round"/>
  <!-- Eye (on head — right side) -->
  <circle cx="48" cy="28" r="1.8" fill="#1d1410"/>
  <circle cx="48.5" cy="27.5" r="0.6" fill="#ffffff"/>
  <!-- Smile -->
  <path d="M 44 36 Q 48 40, 52 36" fill="none" stroke="#1d1410" stroke-width="1.5"
        stroke-linecap="round"/>
</svg>
