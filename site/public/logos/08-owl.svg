<!-- Option 8: Owl — wisdom / oversight / watching.
     The classic learning-tool mark. Easy to make recognisable at
     16 px because the two eyes do the heavy lifting. Might feel
     familiar (education products lean on owls hard). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="skillskit">
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0f1a2a"/>
  <!-- Ear tufts -->
  <path d="M 16 12 L 20 6 L 24 14 Z" fill="#d4bf8a"/>
  <path d="M 40 14 L 44 6 L 48 12 Z" fill="#d4bf8a"/>
  <!-- Body / head (single rounded shape) -->
  <path d="M 12 30
           Q 12 14, 32 14
           Q 52 14, 52 30
           L 52 44
           Q 52 54, 32 54
           Q 12 54, 12 44
           Z" fill="#d4bf8a"/>
  <!-- Chest pattern -->
  <path d="M 22 40 Q 32 48, 42 40
           Q 32 52, 22 40 Z" fill="#b89a60"/>
  <!-- Left eye (big) -->
  <circle cx="24" cy="28" r="7" fill="#ffffff"/>
  <circle cx="24" cy="28" r="3.5" fill="#0f1a2a"/>
  <!-- Right eye -->
  <circle cx="40" cy="28" r="7" fill="#ffffff"/>
  <circle cx="40" cy="28" r="3.5" fill="#0f1a2a"/>
  <!-- Beak -->
  <path d="M 30 34 L 32 40 L 34 34 Z" fill="#d97a3a"/>
</svg>
