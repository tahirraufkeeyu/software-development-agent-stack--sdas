<!-- Option 11: Octopus — many arms, many skills.
     Direct metaphor for a library of tools / skills you can deploy
     independently. Dark-tile background matches Options 3 & 5 for
     visual family. GitHub's Octocat is related but distinct enough. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="skillskit">
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0b0d10"/>
  <!-- Head / mantle -->
  <path d="M 16 24
           Q 16 10, 32 10
           Q 48 10, 48 24
           L 48 36
           Q 40 34, 32 34
           Q 24 34, 16 36
           Z" fill="#9b7ad6"/>
  <!-- Highlight on head -->
  <ellipse cx="26" cy="18" rx="6" ry="3" fill="#c5abf0" opacity="0.6"/>
  <!-- Tentacles - each a curvy path, 6 total -->
  <!-- Leftmost -->
  <path d="M 18 34 Q 12 42, 14 52 Q 16 56, 12 54"
        fill="none" stroke="#9b7ad6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Inner left -->
  <path d="M 24 34 Q 22 44, 26 52 Q 28 56, 24 58"
        fill="none" stroke="#9b7ad6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Center-left -->
  <path d="M 30 34 Q 30 46, 32 54"
        fill="none" stroke="#9b7ad6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Center-right -->
  <path d="M 34 34 Q 36 44, 38 54"
        fill="none" stroke="#9b7ad6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Inner right -->
  <path d="M 40 34 Q 44 42, 42 52 Q 40 56, 44 58"
        fill="none" stroke="#9b7ad6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Rightmost -->
  <path d="M 46 34 Q 52 42, 50 52 Q 48 56, 52 54"
        fill="none" stroke="#9b7ad6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="26" cy="24" r="2.2" fill="#0b0d10"/>
  <circle cx="38" cy="24" r="2.2" fill="#0b0d10"/>
  <!-- Eye shine -->
  <circle cx="26.5" cy="23.5" r="0.7" fill="#ffffff"/>
  <circle cx="38.5" cy="23.5" r="0.7" fill="#ffffff"/>
</svg>
