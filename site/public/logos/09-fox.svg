<!-- Option 9: Fox — clever / adaptable / helpful.
     Face-forward geometric fox. Simple enough to read at 16 px;
     distinct from the Firefox fire-fox association because it's a
     face, not a body-wrapping-globe. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="skillskit">
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#fdf7f1"/>
  <!-- Head base (triangular, tapering to muzzle) -->
  <path d="M 14 18
           L 32 54
           L 50 18
           Z" fill="#e67934"/>
  <!-- Left ear -->
  <path d="M 14 18 L 10 6 L 22 16 Z" fill="#e67934"/>
  <!-- Left ear inner -->
  <path d="M 14 14 L 12 9 L 19 13 Z" fill="#fdf7f1"/>
  <!-- Right ear -->
  <path d="M 50 18 L 54 6 L 42 16 Z" fill="#e67934"/>
  <!-- Right ear inner -->
  <path d="M 50 14 L 52 9 L 45 13 Z" fill="#fdf7f1"/>
  <!-- Cheek markings (white) -->
  <path d="M 22 34 L 32 48 L 18 32 Z" fill="#fdf7f1"/>
  <path d="M 42 34 L 32 48 L 46 32 Z" fill="#fdf7f1"/>
  <!-- Muzzle white -->
  <path d="M 26 42 L 32 52 L 38 42 Z" fill="#fdf7f1"/>
  <!-- Eyes -->
  <circle cx="24" cy="28" r="2.2" fill="#1d1410"/>
  <circle cx="40" cy="28" r="2.2" fill="#1d1410"/>
  <!-- Nose -->
  <circle cx="32" cy="42" r="2" fill="#1d1410"/>
</svg>
