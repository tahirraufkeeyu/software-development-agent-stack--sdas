<!-- Option 3: Prompt caret — `>_` as a mark. Terminal-native identity,
     instantly legible to the dev audience. Minimalist. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="skillskit">
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0b0d10"/>
  <!-- Caret -->
  <path d="M 18 22 L 30 32 L 18 42"
        fill="none" stroke="#7ac8ff" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Underscore / cursor -->
  <rect x="34" y="40" width="14" height="3" rx="1.5" fill="#7ac8ff"/>
</svg>
