<!-- Option 7: Capybara — the friendly, unusual pick.
     Calm, unfussed, memorable. Capybaras have become a dev-community
     meme; this puts a recognisable character on the brand without
     leaning corporate. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="skillskit">
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#f7f3ee"/>
  <!-- Body (rounded rectangle) -->
  <rect x="12" y="28" width="36" height="20" rx="10" fill="#8b5e3c"/>
  <!-- Head (round, on the right side) -->
  <circle cx="50" cy="26" r="11" fill="#8b5e3c"/>
  <!-- Ears -->
  <ellipse cx="44" cy="16" rx="3" ry="2.5" fill="#8b5e3c"/>
  <ellipse cx="54" cy="16" rx="3" ry="2.5" fill="#8b5e3c"/>
  <!-- Inner ear highlight -->
  <circle cx="44" cy="16" r="1" fill="#5a3a22"/>
  <circle cx="54" cy="16" r="1" fill="#5a3a22"/>
  <!-- Eye -->
  <circle cx="53" cy="24" r="1.8" fill="#1d1410"/>
  <!-- Eye shine -->
  <circle cx="53.5" cy="23.5" r="0.6" fill="#ffffff"/>
  <!-- Nose -->
  <ellipse cx="58.5" cy="28.5" rx="1.8" ry="1.2" fill="#1d1410"/>
  <!-- Legs -->
  <rect x="16" y="46" width="5" height="8" rx="2" fill="#6f4a2e"/>
  <rect x="24" y="46" width="5" height="8" rx="2" fill="#6f4a2e"/>
  <rect x="33" y="46" width="5" height="8" rx="2" fill="#6f4a2e"/>
  <rect x="41" y="46" width="5" height="8" rx="2" fill="#6f4a2e"/>
</svg>
