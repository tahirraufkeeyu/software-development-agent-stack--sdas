<!-- Option 5: Bracket pair — a stylised '{ }' with a dot between,
     representing code + the skill as a small encoded unit. Very
     developer-native, Markdown-adjacent. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="skillskit">
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0b0d10"/>
  <!-- Left brace -->
  <path d="M 24 16
           C 20 16, 18 18, 18 22
           L 18 28
           C 18 30, 16 32, 14 32
           C 16 32, 18 34, 18 36
           L 18 42
           C 18 46, 20 48, 24 48"
        fill="none" stroke="#7ac8ff" stroke-width="2.6"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#7ac8ff"/>
  <!-- Right brace -->
  <path d="M 40 16
           C 44 16, 46 18, 46 22
           L 46 28
           C 46 30, 48 32, 50 32
           C 48 32, 46 34, 46 36
           L 46 42
           C 46 46, 44 48, 40 48"
        fill="none" stroke="#7ac8ff" stroke-width="2.6"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
