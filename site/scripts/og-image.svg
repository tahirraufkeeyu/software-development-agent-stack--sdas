<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Ambient glow top-right so the card has warmth without being noisy. -->
  <defs>
    <radialGradient id="glow" cx="75%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#7ac8ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7ac8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e7edf2"/>
      <stop offset="100%" stop-color="#c9d5e0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0b0d10"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid lines (very low opacity) for texture. -->
  <g stroke="#242a34" stroke-width="1" opacity="0.35">
    <line x1="0"    y1="130" x2="1200" y2="130"/>
    <line x1="0"    y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Logo mark: stacked cards -->
  <g transform="translate(72, 70)">
    <rect x="0"  y="12" width="46" height="34" rx="5" fill="#181d24" stroke="#39414e" stroke-width="1.5"/>
    <rect x="8"  y="6"  width="46" height="34" rx="5" fill="#12161b" stroke="#39414e" stroke-width="1.5"/>
    <rect x="16" y="0"  width="46" height="34" rx="5" fill="#0b0d10" stroke="#7ac8ff" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <text x="160" y="105" font-family="Inter, -apple-system, sans-serif" font-size="34" font-weight="700" fill="#e7edf2">
    skillskit<tspan fill="#8b96a5" font-weight="500">.dev</tspan>
  </text>

  <!-- Eyebrow -->
  <text x="72" y="220" font-family="JetBrains Mono, SF Mono, monospace" font-size="18" fill="#7ac8ff" letter-spacing="4">
    OPEN SOURCE  ·  MIT  ·  64 SKILLS  ·  8 DEPARTMENTS
  </text>

  <!-- Main headline -->
  <text x="72" y="310" font-family="Inter, -apple-system, sans-serif" font-size="74" font-weight="800" fill="url(#headline)" letter-spacing="-2.5">
    Automate your SDLC.
  </text>
  <text x="72" y="395" font-family="Inter, -apple-system, sans-serif" font-size="74" font-weight="800" fill="#7ac8ff" letter-spacing="-2.5">
    An expert for every team.
  </text>

  <!-- Install command box -->
  <rect x="72" y="452" width="980" height="88" rx="12" fill="#12161b" stroke="#242a34" stroke-width="1.5"/>
  <text x="100" y="507" font-family="JetBrains Mono, SF Mono, monospace" font-size="28" fill="#5bd66b">$</text>
  <text x="128" y="507" font-family="JetBrains Mono, SF Mono, monospace" font-size="28" fill="#e7edf2">brew install tahirraufkeeyu/tap/skillskit</text>

  <!-- Dept color dots (subtle swatch strip) -->
  <g transform="translate(72, 572)">
    <circle cx="0"   cy="10" r="7" fill="#7ac8ff"/>
    <circle cx="24"  cy="10" r="7" fill="#ff8a94"/>
    <circle cx="48"  cy="10" r="7" fill="#7eddb9"/>
    <circle cx="72"  cy="10" r="7" fill="#f5c871"/>
    <circle cx="96"  cy="10" r="7" fill="#c9a6ff"/>
    <circle cx="120" cy="10" r="7" fill="#ff9fc4"/>
    <circle cx="144" cy="10" r="7" fill="#ffb37a"/>
    <circle cx="168" cy="10" r="7" fill="#7fdbe8"/>
    <text x="200" y="17" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#8b96a5">
      developers · security · devops · infrastructure · qa · sales · marketing · internal-comms
    </text>
  </g>
</svg>
